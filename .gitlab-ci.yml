stages:
  - validate
  - test

validate_flows:
  stage: validate
  image: python:3.10
  script:
    - pip install pyyaml
    - python3 -c "import yaml, glob; [print('VALID:', f) or yaml.safe_load(open(f).read()) for f in glob.glob('flows/*.yml')]"

test_dependencies:
  stage: test
  image: python:3.10
  script:
    - echo "Installing dependencies..."
    - pip install -r requirements.txt
    - echo "Running dependency validation..."
    - python3 -c "import anthropic, fastmcp, nonexistent_package"
  allow_failure: false
```

`nonexistent_package` will definitely cause an `ImportError` and fail the pipeline. Commit and push this — it will fail immediately.

Then once it fails, go to your issue and trigger:
```
