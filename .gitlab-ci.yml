stages:
  - validate
  - test

validate_flows:
  stage: validate
  image: python:3.10
  script:
    # Step 1: Validate all flow YAML files are well-formed
    - pip install --cache-dir .pip-cache pyyaml
    - |
      python3 -c "
      import yaml, glob, sys
      errors = []
      for f in sorted(glob.glob('flows/*.yml')):
          try:
              yaml.safe_load(open(f, encoding='utf-8').read())
              print(f'VALID: {f}')
          except yaml.YAMLError as e:
              errors.append(f'INVALID: {f} — {e}')
              print(f'INVALID: {f} — {e}')
      if errors:
          sys.exit(1)
      "

    # Step 2: Bidirectional sync check — flows/ ↔ .gitlab/duo/
    - |
      python3 - << 'PYEOF'
      import glob, sys
      mismatches = []

      # Forward: every flows/*.yml must be in .gitlab/duo/
      for f in sorted(glob.glob("flows/*.yml")):
          name = f.split("/")[-1]
          duo_path = f".gitlab/duo/{name}"
          try:
              a = open(f, encoding='utf-8').read()
              b = open(duo_path, encoding='utf-8').read()
              if a != b:
                  mismatches.append(f"CONTENT MISMATCH: {f} != {duo_path}")
          except FileNotFoundError:
              mismatches.append(f"MISSING in .gitlab/duo/: {duo_path}")

      # Reverse: every .gitlab/duo/*.yml must be in flows/
      for f in sorted(glob.glob(".gitlab/duo/*.yml")):
          name = f.split("/")[-1]
          if not glob.glob(f"flows/{name}"):
              mismatches.append(f"MISSING in flows/: flows/{name}")

      if mismatches:
          print("ERROR: flows/ and .gitlab/duo/ out of sync:")
          for m in mismatches:
              print(f"  {m}")
          sys.exit(1)

      flows_count = len(glob.glob("flows/*.yml"))
      duo_count = len(glob.glob(".gitlab/duo/*.yml"))
      print(f"OK: {flows_count} flows, {duo_count} duo files — bidirectional sync confirmed")
      PYEOF

test_all_agents:
  stage: test
  image: python:3.10
  script:
    - pip install pyyaml pytest==8.1.1
    - python3 -m pytest tests/ -v --tb=short