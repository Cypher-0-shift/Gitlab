stages:
  - validate
  - test

validate_flows:
  stage: validate
  image: python:3.10
  script:
    - pip install pyyaml
    - python3 -c "import yaml, glob; [print('VALID:', f) or yaml.safe_load(open(f).read()) for f in glob.glob('flows/*.yml')]"

intentional_fail_job:
  stage: test
  script:
    - echo "FORCING FAILURE"
    - exit 1
  rules:
    - when: always