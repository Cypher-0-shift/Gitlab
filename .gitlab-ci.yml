stages:
  - validate
  - test

validate_flows:
  stage: validate
  image: python:3.10
  script:
    - pip install pyyaml
    - python3 -c "import yaml, glob; [print('VALID:', f) or yaml.safe_load(open(f).read()) for f in glob.glob('flows/*.yml')]"

test_dependencies:
  stage: test
  image: python:3.10
  script:
    - pip install -r requirements.txt
    - python3 -m pytest tests/ -v
  allow_failure: false

test_intentional:
  stage: test
  script:
    - echo "Running dependency check..."
    - python3 -c "import nonexistent_package"