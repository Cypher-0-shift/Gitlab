# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  OpsOrchestrator — Design-Time Configuration                           ║
# ║                                                                        ║
# ║  PURPOSE: This file is the canonical source of truth for all           ║
# ║  configurable thresholds, labels, and settings used by OpsOrchestrator ║
# ║  flows. Values here are baked into flow system prompts at deploy time  ║
# ║  (see flows/*.yml and .gitlab/duo/*.yml).                              ║
# ║                                                                        ║
# ║  HOW TO CHANGE A VALUE:                                                ║
# ║  1. Update the value in this file.                                     ║
# ║  2. Find the corresponding constant in the relevant flow's             ║
# ║     system_prompt (e.g. flows/estimation_flow.yml) and update it.     ║
# ║  3. Run `make sync-duo` (or copy flows/*.yml → .gitlab/duo/*.yml)      ║
# ║     to re-sync the flow definitions GitLab Duo reads.                 ║
# ║                                                                        ║
# ║  WHY NOT READ AT RUNTIME: GitLab Duo Agent Platform flows execute as   ║
# ║  self-contained YAML — there is no runtime file-read step that could   ║
# ║  load this config during agent execution. The values below are         ║
# ║  intentionally duplicated into each flow's system_prompt for that      ║
# ║  reason. This file is the one place to edit them before re-deploying.  ║
# ╚══════════════════════════════════════════════════════════════════════════╝

version: "1.0"

project:
  default_sprint_velocity: 40
  fibonacci_scale: [1, 2, 3, 5, 8]
  capacity_ok_max: 40        # ≤40 pts → sprint is healthy
  capacity_tight_max: 55     # 41–55 pts → sprint-risk label
  component_labels:
    - backend
    - frontend
    - data
    - auth
    - infra
    - testing
    - fullstack

planning:
  min_description_words: 30
  max_tasks: 8
  dedup_word_threshold: 3
  assignment_max_open_issues: 5
  labels:
    planned: "ops-orchestrator-planned"
    sprint2: "sprint-2-candidate"
    blocked: "blocked"

security:
  skip_extensions:
    - .md
    - .txt
    - .rst
    - .adoc
    - .png
    - .jpg
    - .svg
    - .gif
    - .ico
    - .lock
    - .min.js
  auto_fix_severities:
    - CRITICAL
  labels:
    scanned: "ops-orchestrator-security-scanned"
    approved: "security::approved"
    review_required: "security::review-required"
    pii_detected: "pii-detected"

compliance:
  policy_file: ".gitlab/compliance_policy.yaml"
  require_security_scan_before_approval: true
  audit_trail: true
  labels:
    approved: "compliance::approved"
    failed: "compliance::failed"
    audit_generated: "audit-trail-generated"

deployment:
  protected_branches:
    - main
    - master
    - production
    - staging
  labels:
    ready: "deployment::ready"
    caution: "deployment::caution"
    blocked: "deployment::blocked"
    assessed: "ops-orchestrator-deploy-assessed"

estimation:
  fibonacci_only: true
  low_confidence_word_threshold: 20
  labels:
    needs_refinement: "needs-refinement"

global:
  attribution: "*Powered by OpsOrchestrator on GitLab Duo · Claude via Anthropic*"
  dry_run: false