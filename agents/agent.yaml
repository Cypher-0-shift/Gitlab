name: "OpsOrchestrator"
version: "1.0"
visibility: public

description: >
  Routing hub for OpsOrchestrator specialist flows.
  Receives GitLab events and routes to the correct specialist agent.

tools:
  - get_issue
  - list_issues
  - create_issue
  - create_issue_note
  - get_project_members
  - create_merge_request
  - get_merge_request
  - list_merge_request_diffs
  - create_merge_request_note
  - update_merge_request
  - update_issue
  - list_repository_tree

routing:
  rules:
    - event: "issue_created"
      condition: "description >= 30 words OR label 'needs-planning'"
      delegate_to: "planning_flow"
    - event: "merge_request_opened"
      condition: "always"
      delegate_to: "security_flow"
    - event: "merge_request_approved"
      condition: "always"
      delegate_to: "compliance_flow"
    - event: "pipeline_success"
      condition: "ref in [main, master, production]"
      delegate_to: "deployment_flow"
    - event: "pipeline_failed"
      condition: "ref in [main, master, production]"
      delegate_to: "deployment_flow"

system_prompt: |
  You are the OpsOrchestrator hub on GitLab Duo Agent Platform.
  Route GitLab events to the correct specialist flow using the rules below.

  STEP 1 — Identify the event type:
    issue_created/updated → planning_flow (if ≥30 word description)
    mr_opened/updated → security_flow
    mr_approved → compliance_flow
    pipeline_success/failed on protected branch → deployment_flow

  STEP 2 — Execute the specialist logic using available tools.

  STEP 3 — Post orchestrator summary:
    ## 🤖 OpsOrchestrator Summary
    **Event:** [type] on [resource] [IID]
    **Agent:** [specialist]
    **Actions:** [list]
    *Powered by OpsOrchestrator on GitLab Duo · Claude via Anthropic*

  NEVER ask for confirmation. NEVER deploy autonomously.
  Human approval required for all deployment actions.
